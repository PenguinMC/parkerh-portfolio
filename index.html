<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>parkerh.com</title>
<meta name="description" content="">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000'/%3E%3Ccircle cx='50' cy='50' r='3' fill='%236E5EFB'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --fg: #ffffff;
    --accent: #6E5EFB;
    --accent-glow: rgba(110,94,251,0.5);
    --mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    overflow: hidden;
    cursor: none;
    -webkit-font-smoothing: antialiased;
    font-family: var(--mono);
  }
  ::selection { background: var(--accent); color: #000; }

  @media (pointer: coarse) {
    html, body { cursor: auto; }
    .cursor-dot, .cursor-ring { display: none !important; }
  }

  /* Stars canvas */
  #stars {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* Custom cursor */
  .cursor-dot, .cursor-ring {
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: difference;
  }
  .cursor-dot {
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease;
  }
  .cursor-ring {
    width: 38px; height: 38px;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1),
                border-color 0.3s ease;
  }
  .cursor-hover .cursor-ring {
    width: 80px; height: 80px;
    border-color: var(--accent);
    background: rgba(110,94,251,0.06);
  }
  .cursor-hover .cursor-dot {
    transform: translate(-50%, -50%) scale(0);
  }

  /* The one thing: a tiny pulsing dot in dead center */
  /* Centered contact: a slowly rotating ring of text around a small arrow.
     The whole .lure-wrap is the click target. */
  .lure-wrap {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 220px;
    z-index: 10;
    cursor: none;
    border: none;
    background: transparent;
    padding: 0;
    border-radius: 50%;
  }
  .lure-ring {
    position: absolute;
    inset: 0;
    animation: lureSpin 18s linear infinite;
    transition: animation-duration 0.5s ease;
  }
  .lure-wrap:hover .lure-ring {
    animation-duration: 6s;
  }
  .lure-ring svg { width: 100%; height: 100%; overflow: visible; }
  .lure-ring text {
    font-family: var(--mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    fill: rgba(255,255,255,0.78);
    transition: fill 0.4s ease;
  }
  .lure-wrap:hover .lure-ring text { fill: #fff; }

  /* Center mark: a thin ring + small arrow */
  .lure-center {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 84px; height: 84px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    display: grid; place-items: center;
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1),
                border-color 0.4s ease,
                background 0.4s ease,
                box-shadow 0.5s ease;
  }
  .lure-wrap:hover .lure-center {
    transform: translate(-50%, -50%) scale(1.08);
    border-color: var(--accent);
    background: rgba(110,94,251,0.06);
    box-shadow: 0 0 40px var(--accent-glow), inset 0 0 30px rgba(110,94,251,0.08);
  }
  .lure-arrow-svg {
    width: 26px; height: 26px;
    color: rgba(255,255,255,0.85);
    transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), color 0.4s ease;
  }
  .lure-wrap:hover .lure-arrow-svg {
    transform: translate(2px, -2px);
    color: #fff;
  }

  /* Subtle violet aura behind the whole assembly */
  .lure-aura {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 280px; height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(110,94,251,0.22) 0%, transparent 60%);
    pointer-events: none;
    animation: lureBreath 4.5s ease-in-out infinite;
    z-index: -1;
  }
  @keyframes lureBreath {
    0%, 100% { opacity: 0.55; transform: translate(-50%, -50%) scale(0.95); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  }
  @keyframes lureSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .lure::before {
    content: "";
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    border: 1px solid var(--accent-glow);
    opacity: 0;
    animation: lureRing 2.4s ease-out infinite;
  }
  .lure::after {
    content: "";
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    border: 1px solid var(--accent-glow);
    opacity: 0;
    animation: lureRing 2.4s ease-out 1.2s infinite;
  }
  @keyframes lurePulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    50% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
  }
  @keyframes lureRing {
    0% { opacity: 0.6; transform: scale(0.5); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* Contact overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    display: grid;
    place-items: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .overlay.open {
    opacity: 1;
    visibility: visible;
  }
  .overlay-close {
    position: absolute;
    top: 28px; right: 28px;
    width: 32px; height: 32px;
    border: none;
    background: transparent;
    cursor: none;
    color: rgba(255,255,255,0.5);
    transition: color 0.25s ease, transform 0.3s ease;
  }
  .overlay-close::before, .overlay-close::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 18px; height: 1px;
    background: currentColor;
    transform-origin: center;
  }
  .overlay-close::before { transform: translate(-50%, -50%) rotate(45deg); }
  .overlay-close::after  { transform: translate(-50%, -50%) rotate(-45deg); }
  .overlay-close:hover { color: var(--fg); transform: rotate(90deg); }

  .overlay-inner {
    width: 100%;
    max-width: 480px;
    padding: 0 32px;
    transform: translateY(20px);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s,
                opacity 0.6s ease 0.1s;
  }
  .overlay.open .overlay-inner {
    transform: translateY(0);
    opacity: 1;
  }

  form { display: grid; gap: 18px; }
  .field { position: relative; }
  .field input, .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 14px 0;
    color: var(--fg);
    font-family: var(--mono);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color 0.3s ease;
  }
  .field input:focus, .field textarea:focus {
    border-bottom-color: var(--accent);
  }
    .field select {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    padding: 14px 0;
    color: var(--fg);
    font-family: var(--mono);
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color 0.3s ease;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    cursor: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none'><path d='M1 1l4 4 4-4' stroke='%23ffffff' stroke-opacity='0.4' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0 center;
    padding-right: 20px;
  }
  .field select:focus { border-bottom-color: var(--accent); }
  .field select option {
    background: #0a0a0a;
    color: var(--fg);
    font-family: var(--mono);
    font-size: 13px;
  }
  .field select:invalid, .field select option[value=""] {
    color: rgba(255,255,255,0.3);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
  }
  .field input::placeholder, .field textarea::placeholder {
    color: rgba(255,255,255,0.3);
    font-family: var(--mono);
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .field textarea {
    min-height: 90px;
    resize: none;
    line-height: 1.6;
  }
  .send {
    margin-top: 4px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.85);
    padding: 14px 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: none;
    font-weight: 400;
    justify-self: end;
    position: relative;
    overflow: hidden;
    transition: color 0.4s ease, border-color 0.4s ease;
  }
  .send::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    z-index: -1;
  }
  .send:hover {
    color: #fff;
    border-color: var(--accent);
  }
  .send:hover::before { transform: scaleX(1); }
  .send:disabled { opacity: 0.4; }
  .status {
    grid-column: 1 / -1;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    text-align: right;
    min-height: 14px;
    color: rgba(255,255,255,0.5);
  }
  .status.ok { color: #5eead4; }
  .status.err { color: #f87171; }

  /* hidden but reachable for screen readers */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }
</style>
</head>
<body>

<canvas id="stars" aria-hidden="true"></canvas>
<div class="cursor-ring" aria-hidden="true"></div>
<div class="cursor-dot" aria-hidden="true"></div>

<button class="lure-wrap" data-cursor-hover aria-label="Open contact">
  <span class="lure-aura" aria-hidden="true"></span>
  <span class="lure-ring" aria-hidden="true">
    <svg viewBox="0 0 220 220">
      <defs>
        <path id="lure-circle" d="M 110, 110 m -94, 0 a 94,94 0 1,1 188,0 a 94,94 0 1,1 -188,0" />
      </defs>
      <text>
        <textPath href="#lure-circle" startOffset="0">CONTACT &#x2022; PARKER HUGHES &#x2022; CONTACT &#x2022; PARKER HUGHES &#x2022; </textPath>
      </text>
    </svg>
  </span>
  <span class="lure-center" aria-hidden="true">
    <svg class="lure-arrow-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <line x1="7" y1="17" x2="17" y2="7"/>
      <polyline points="9,7 17,7 17,15"/>
    </svg>
  </span>
</button>
  </div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Contact">
  <button class="overlay-close" data-cursor-hover aria-label="Close"></button>
  <div class="overlay-inner">
    <form id="contact-form" novalidate autocomplete="off">
      <span class="sr-only">Send a message</span>
      <div class="field">
        <label for="f-name" class="sr-only">Your name</label>
        <input id="f-name" name="name" type="text" required placeholder="name">
      </div>
      <div class="field">
        <label for="f-email" class="sr-only">Your email</label>
        <input id="f-email" name="email" type="email" required placeholder="email">
      </div>
      <div class="field">
        <label for="f-message" class="sr-only">Your message</label>
        <textarea id="f-message" name="message" required placeholder="message"></textarea>
      </div>
      <button type="submit" class="send" data-cursor-hover>Send</button>
      <div class="status" id="form-status" aria-live="polite"></div>
    </form>
  </div>
</div>

<script>
/* ===== Canvas stars + shooters ===== */
(function () {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [], shooters = [], W = 0, H = 0;
  function resize() {
    W = canvas.width = window.innerWidth * window.devicePixelRatio;
    H = canvas.height = window.innerHeight * window.devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    initStars();
  }
  function initStars() {
    stars = [];
    const count = Math.min(320, Math.floor((W * H) / 7500));
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random() * 0.8 + 0.2,
        twinkle: Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * 0.025 + 0.005,
        vx: (Math.random() - 0.5) * 0.04,
        vy: (Math.random() - 0.5) * 0.04
      });
    }
  }
  function spawnShooter() {
    if (Math.random() > 0.997) {
      shooters.push({
        x: Math.random() * W * 0.6,
        y: Math.random() * H * 0.4,
        len: 80 + Math.random() * 80,
        speed: 3 + Math.random() * 2,
        life: 1,
        angle: Math.PI / 4 + (Math.random() - 0.5) * 0.4
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const s of stars) {
      s.twinkle += s.twinkleSpeed;
      s.x += s.vx; s.y += s.vy;
      if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
      if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
      const alpha = s.a * (0.55 + 0.45 * Math.sin(s.twinkle));
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.arc(s.x, s.y, s.r * window.devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
      if (s.r > 1) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha * 0.2})`;
        ctx.arc(s.x, s.y, s.r * 3 * window.devicePixelRatio, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    spawnShooter();
    for (let i = shooters.length - 1; i >= 0; i--) {
      const sh = shooters[i];
      sh.x += Math.cos(sh.angle) * sh.speed * window.devicePixelRatio;
      sh.y += Math.sin(sh.angle) * sh.speed * window.devicePixelRatio;
      sh.life -= 0.012;
      if (sh.life <= 0 || sh.x > W + 100 || sh.y > H + 100) { shooters.splice(i, 1); continue; }
      const tailX = sh.x - Math.cos(sh.angle) * sh.len * window.devicePixelRatio;
      const tailY = sh.y - Math.sin(sh.angle) * sh.len * window.devicePixelRatio;
      const grad = ctx.createLinearGradient(sh.x, sh.y, tailX, tailY);
      grad.addColorStop(0, `rgba(255,255,255,${sh.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.4 * window.devicePixelRatio;
      ctx.beginPath();
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(tailX, tailY);
      ctx.stroke();
    }
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize', resize);
  draw();
})();

/* ===== Custom cursor ===== */
(function () {
  if (window.matchMedia('(pointer: coarse)').matches) return;
  const dot = document.querySelector('.cursor-dot');
  const ring = document.querySelector('.cursor-ring');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
  });
  function loop() {
    rx += (mx - rx) * 0.16;
    ry += (my - ry) * 0.16;
    ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
    requestAnimationFrame(loop);
  }
  loop();
  document.body.addEventListener('mouseenter', () => document.body.classList.add('cursor-on'), { once: true });
  function rebind() {
    document.querySelectorAll('[data-cursor-hover]').forEach(el => {
      if (el.dataset.cbound) return;
      el.dataset.cbound = '1';
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });
  }
  rebind();
  new MutationObserver(rebind).observe(document.body, { subtree: true, childList: true });
})();

/* ===== Overlay open / close ===== */
(function () {
  const overlay = document.getElementById('overlay');
  const lure = document.querySelector('.lure-wrap');
  const closeBtn = overlay.querySelector('.overlay-close');
  const firstField = overlay.querySelector('input');
  function open() {
    overlay.classList.add('open');
    setTimeout(() => firstField && firstField.focus(), 350);
  }
  function close() {
    overlay.classList.remove('open');
    document.body.classList.remove('cursor-hover');
  }
  lure.addEventListener('click', open);
  closeBtn.addEventListener('click', close);
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') close();
  });
})();

/* ===== Contact form submission ===== */
(function () {
  const form = document.getElementById('contact-form');
  const status = document.getElementById('form-status');
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = form.querySelector('.send');
    const data = Object.fromEntries(new FormData(form).entries());
    if (!data.name || !data.email || !data.message || !data.project_type || !data.timeline) {
      status.textContent = 'fill required fields';
      status.className = 'status err';
      return;
    }
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = '...';
    status.textContent = '';
    status.className = 'status';
    try {
      const r = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (r.ok) {
        form.reset();
        status.textContent = 'received';
        status.className = 'status ok';
        setTimeout(() => {
          document.getElementById('overlay').classList.remove('open');
          setTimeout(() => { status.textContent = ''; status.className = 'status'; }, 500);
        }, 1600);
      } else {
        const j = await r.json().catch(() => ({}));
        status.textContent = (j.error || 'try again').toLowerCase();
        status.className = 'status err';
      }
    } catch (err) {
      status.textContent = 'network error';
      status.className = 'status err';
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  });
})();
</script>
</body>
</html>
